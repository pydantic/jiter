fail_fast: true

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
        exclude: 'benches/.*\.json'
      - id: trailing-whitespace
      - id: check-added-large-files

  - repo: https://github.com/google/yamlfmt
    rev: v0.21.0
    hooks:
      - id: yamlfmt

  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.23.1
    hooks:
      - id: zizmor

  - repo: local
    hooks:
      - id: format-check
        name: Format Check
        entry: cargo fmt
        types: [rust]
        language: system
        pass_filenames: false
      - id: clippy
        name: Clippy
        entry: cargo clippy -F python --workspace --all-targets -- -D warnings
        types: [rust]
        language: system
        pass_filenames: false
      - id: lint-python
        name: Lint python
        entry: make lint-python
        types: [python]
        language: system
        pass_filenames: false
      - id: check-without-num-bigint
        name: Check without num-bigint feature
        entry: cargo check --no-default-features --package jiter
        types: [rust]
        language: system
        pass_filenames: false
      - id: test
        name: Test
        entry: cargo test --test main
        types: [rust]
        language: system
        pass_filenames: false
